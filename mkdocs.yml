  2-Zigbee-Radio-Silabs-EFR32/23-Bootloader-UART-Xmodem/patches/README.md
  2-Zigbee-Radio-Silabs-EFR32/24-NCP-UART-HW/patches/README.md
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/linux-*/
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/files/
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/patches/
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/scripts/
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/test_results_*/
  # Gitignored dev notes — not in git, also excluded from the site
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/COMPRESSION.md
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/IRAM-DMEM-MIPS16.md
  3-Main-SoC-Realtek-RTL8196E/32-Kernel/OPUS_REVIEW_PROMPT.md
  # Dev notes — Ethernet driver perf analysis, contributor-only
