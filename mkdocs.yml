  3-Main-SoC-Realtek-RTL8196E/34-Userdata/ot-br-posix/build/
  3-Main-SoC-Realtek-RTL8196E/34-Userdata/ot-br-posix/src/
  # Vendored ot-br-posix git clone (the doubled-path inner copy)
  3-Main-SoC-Realtek-RTL8196E/34-Userdata/ot-br-posix/ot-br-posix/
  3-Main-SoC-Realtek-RTL8196E/CHANGELOG.md
  3-Main-SoC-Realtek-RTL8196E/3-Main-SoC-Realtek-RTL8196E/
  backups/

  # Developer notes — readable on github.com but excluded from the site
  3-Main-SoC-Realtek-RTL8196E/31-Bootloader/doc/MEMO_BOOTLOADER.md
  3-Main-SoC-Realtek-RTL8196E/31-Bootloader/doc/BOOTLOADER_TOOLCHAIN_NOTES.md
  3-Main-SoC-Realtek-RTL8196E/31-Bootloader/doc/RESET_VECTOR_AUDIT.md
