homeassistant:
  enabled: false
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto:1883
serial:
  port: tcp://192.168.1.88:8888
  adapter: zoh
frontend:
  enabled: true
  port: 8080
advanced:
  log_level: info
  log_output:
    - console
version: 4
# Device list is kept in devices.yaml inside the persistent z2m_data
# volume (/app/data/devices.yaml). Z2M reads and writes it on its own
# when sensors are paired or renamed, so personal IEEE addresses never
# land in this committed config.
devices: devices.yaml
