# Docker Compose for Zigbee stack with Lidl Silvercrest Gateway (OT-RCP mode)
#
# Unlike 25-RCP-UART-HW (which requires cpcd + zigbeed), OT-RCP uses the
# Spinel/HDLC protocol directly. Zigbee2MQTT connects to the gateway's
# serialgateway TCP socket via the zigbee-on-host (zoh) adapter.
#
# Usage:
#   1. Flash ot-rcp.gbl to the EFR32
#   2. Ensure serialgateway is running on the gateway (port 8888)
#   3. docker compose up -d
#   4. Access Zigbee2MQTT at http://localhost:8080

services:
  # MQTT broker
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    environment:
      - TZ=Europe/Paris
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Zigbee2MQTT with zoh adapter — connects directly to serialgateway
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt:2.7.2
    environment:
      - TZ=Europe/Paris
    volumes:
      - z2m_data:/app/data
      - ./z2m/configuration.yaml:/app/data/configuration.yaml
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy

volumes:
  mosquitto_data:
  mosquitto_log:
  z2m_data:
