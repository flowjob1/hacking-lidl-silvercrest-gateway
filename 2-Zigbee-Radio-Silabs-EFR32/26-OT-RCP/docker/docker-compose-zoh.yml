# Use case 1: ZoH — Zigbee via zigbee-on-host (Zigbee2MQTT zoh adapter)
#
# Stack: Mosquitto + Zigbee2MQTT
# The Zigbee stack runs on the host (zigbee-on-host by @Nerivec), not on
# the EFR32. OT-RCP provides the raw 802.15.4 radio via Spinel/HDLC.
#
# See also:
#   docker-compose-otbr-host.yml    — Use case 2: OTBR on host
#   docker-compose-otbr-gateway.yml — Use case 3: OTBR on gateway (v2.0+)
#
# Usage:
#   1. Flash ot-rcp.gbl to the EFR32, flash userdata in Zigbee mode
#   2. Ensure the gateway runs kernel 6.18 with rtl8196e-uart-bridge armed
#      (S50uart_bridge at boot → TCP:8888)
#   3. Edit z2m/configuration.yaml — set your gateway IP
#   4. docker compose -f docker-compose-zoh.yml up -d
#   5. Access Zigbee2MQTT at http://localhost:8080

services:
  # MQTT broker
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    environment:
      - TZ=Europe/Paris
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Zigbee2MQTT with zoh adapter — connects directly to the kernel UART bridge
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt:2.7.2
    environment:
      - TZ=Europe/Paris
    volumes:
      - z2m_data:/app/data
      - ./z2m/configuration.yaml:/app/data/configuration.yaml
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy

volumes:
  mosquitto_data:
  mosquitto_log:
  z2m_data:
